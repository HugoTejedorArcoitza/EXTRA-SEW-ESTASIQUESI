    <text x="450.0" y="308" text-anchor="middle">Distancia acumulada: 2000 m</text>
    <text x="18" y="160.0" transform="rotate(-90 18 160.0)">Altitud: 9-14 m</text>
    <polyline points="50,270 50.00,138.00 150.00,50.00 290.00,182.00 550.00,270.00 850.00,226.00 850,270" fill="#dff1ed" stroke="#006d75" stroke-width="4" />
